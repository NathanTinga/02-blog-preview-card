<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Blog preview card</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }

      @font-face {
        font-family: "Figtree";
        src: url("assets/fonts/Figtree-VariableFont_wght.ttf")
          format("truetype");
        font-weight: 500 800;
        font-style: normal;
      }

      @font-face {
        font-family: "Figtree";
        src: url("assets/fonts/Figtree-Italic-VariableFont_wght.ttf")
          format("truetype");
        font-weight: 500 800;
        font-style: italic;
      }

      :root {
        --white: hsl(0, 0%, 100%);
        --yellow: hsl(47, 88%, 63%);
        --gray-500: hsl(0, 0%, 42%);
        --gray-950: hsl(0, 0%, 7%);
      }

      body {
        background-color: var(--yellow);
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 1rem;
        font-family: Figtree;
        font-weight: 500;
      }

      .card {
        position: relative;
        background-color: white;
        border: 2px solid black;
        border-radius: 25px;
        max-width: 400px;
        padding: 25px;
      }

      .card::after {
        content: "";
        position: absolute;
        inset: 0;
        background: black;
        border-radius: 20px;
        transform: translate(10px, 10px);
        z-index: -1;
      }

      .tag {
        background-color: var(--yellow);
        border-radius: 4px;
        padding: 8px;
        width: fit-content;
        font-weight: 800;
      }

      .article-illustration {
        border-radius: 20px;
        height: auto;
        width: 100%;
      }

      .description {
        color: var(--gray-500);
        font-style: italic;
      }

      .author-wrapper {
        display: flex;
        justify-content: left;
        align-items: center;
      }

      .profile-picture {
        height: 30px;
        width: auto;
      }

      .author {
        margin-left: 15px;
        font-weight: 800;
      }

      .publication {
        font-weight: 500;
      }

      .title a {
        color: inherit;
        text-decoration: none;
      }

      .title a:hover {
        color: var(--yellow);
      }
    </style>
  </head>
  <body>
    <section class="card">
      <img
        src="assets/images/illustration-article.svg"
        alt="Article Illustration"
        class="article-illustration"
      />
      <h4 class="tag">Learning</h4>

      <h4 class="publication">Published 21 Dec 2023</h4>
      <h1 class="title">
        <a href="https://www.w3schools.com/htmlcss/">HTML & CSS foundations</a>
      </h1>

      <p class="description">
        These languages are the backbone of every website, defining structure,
        content, and presentation.
      </p>

      <div class="author-wrapper">
        <img
          src="assets/images/image-avatar.webp"
          alt="Greg Hooper profile picture"
          class="profile-picture"
        />
        <p class="author">Greg Hooper</p>
      </div>
    </section>
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Nathan Tinga</a>.
    </footer>
  </body>
</html>
